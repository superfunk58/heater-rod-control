name: Build firmware binary

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e esp32dev_ota

      - name: Collect firmware binary
        run: |
          mkdir -p release
          DATE_STAMP="$(date -u +%Y%m%d)"
          cp .pio/build/esp32dev_ota/firmware.bin "release/firmware-${DATE_STAMP}.bin"

      - name: Upload release directory
        uses: actions/upload-artifact@v4
        with:
          name: firmware-release
          path: release/

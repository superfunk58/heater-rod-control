[platformio]
default_envs = esp32dev_ota

; ---------------------------------------------------------------------------
; ESP32 DevKit v1 (30-pin) - WiFi + MQTT + PsychicHttp + SSE + OTA
; PsychicHttp wraps ESP-IDF's esp_http_server (Espressif-maintained, stable,
; no AsyncTCP thread-safety footguns). Realtime UI via Server-Sent Events on
; /events. Web UI lives in data/www/ (LittleFS); upload with `pio run -t uploadfs`.
; History ring buffer persisted in dedicated `histdata` NVS partition.
;
; Default upload = OTA to fixed IP. Use `-e esp32dev_serial` for USB flashing.
; ---------------------------------------------------------------------------
[env:esp32dev_ota]
; pioarduino fork = Arduino-ESP32 Core 3.x (IDF 5.x). Required for W5500 SPI
; Ethernet (ETH_PHY_W5500) which the official espressif32 platform (Core 2.0.x)
; does not provide. Pinned release for reproducible builds.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions_heater.csv
board_build.filesystem = littlefs
upload_protocol = espota
upload_port = 192.168.178.50
upload_flags =
    --port=3232
    --timeout=600
    --progress
build_flags =
    -Wall
    -DCORE_DEBUG_LEVEL=1
lib_ignore =
    WiFiNINA_-_Adafruit_Fork
    WiFi101
    WiFiNINA
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson
    luisllamasbinaburo/InterpolationLib @ ^1.0.2
    ; v1.1.0 introduced a PWM_SINGLE class that calls
    ; analogWriteResolution(pin, bits) which doesn't exist on ESP32.
    ; v1.0.1 only supports the I2C-based GP8413 we use, and compiles cleanly.
    DFRobot/DFRobot_GP8XXX @ 1.0.1
    hoeken/PsychicHttp @ ^1.2.1
    paulstoffregen/OneWire @ ^2.3.7
    milesburton/DallasTemperature @ ^3.11.0

; ---------------------------------------------------------------------------
; Serial flashing fallback (initial firmware / recovery).
; Usage: pio run -e esp32dev_serial -t upload
; ---------------------------------------------------------------------------
[env:esp32dev_serial]
extends = env:esp32dev_ota
upload_protocol = esptool
upload_port = /dev/cu.wchusbserial1230
upload_speed = 460800
upload_flags =

; ---------------------------------------------------------------------------
; OTA over LAN (W5500) to the device's static/DHCP IP 192.168.178.50.
; Usage: pio run -e esp32dev_ota_lan -t upload
; ---------------------------------------------------------------------------
[env:esp32dev_ota_lan]
extends = env:esp32dev_ota
upload_protocol = espota
upload_port = 192.168.178.64
upload_flags =
    --port=3232
    --timeout=600
    --progress
